<!doctype html>
<html lang="en">
  <meta charset="UTF-8" /><meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  /><meta name="theme-color" content="#22d3ee" /><title>
    Threshold Lab offline</title
  ><style>
    body {
      margin: 0;
      background: #101827;

      text-align: center;

    main {
      max-width: 32rem;
      padding: 2rem;

    button {
      min-height: 44px;
      padding: 0.7rem 1.2rem;

  <main>
    <h1>Threshold Lab is offline</h1>
    <p>
      The complete game becomes available after one online load finishes
      preparing its cache.
    </p>
    <button onclick="location.reload()">Try again</button>
  </main>
</html>
